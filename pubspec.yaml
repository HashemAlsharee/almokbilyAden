name: almokbily_aden
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_localizations:
    sdk: flutter
  flutter_svg: ^2.2.0
  flutter_pdfview: ^1.3.2
  path_provider: ^2.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

  assets:
    - images/
    - lib/Data/
    - datasheet/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "images/icon.jpg"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "images/icon.jpg"
  windows:
    generate: true
    image_path: "images/icon.jpg"
  macos:
    generate: true
    image_path: "images/icon.jpg"

